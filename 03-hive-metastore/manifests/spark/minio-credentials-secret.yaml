# MinIO credentials for Spark S3A access (in spark namespace)
# Used by spark-submit via secretKeyRef to inject credentials into driver/executor pods
# Values: minioadmin / minioadmin123
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: spark
  labels:
    app: spark
type: Opaque
data:
  # echo -n 'minioadmin' | base64
  AWS_ACCESS_KEY_ID: bWluaW9hZG1pbg==
  # echo -n 'minioadmin123' | base64
  AWS_SECRET_ACCESS_KEY: bWluaW9hZG1pbjEyMw==
