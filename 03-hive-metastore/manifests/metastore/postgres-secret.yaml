# PostgreSQL credentials for the Hive Metastore backend database
# In production, use a secrets manager or sealed secrets
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: metastore
  labels:
    app: postgres
type: Opaque
stringData:
  POSTGRES_DB: metastore_db
  POSTGRES_USER: hive
  POSTGRES_PASSWORD: hive123
