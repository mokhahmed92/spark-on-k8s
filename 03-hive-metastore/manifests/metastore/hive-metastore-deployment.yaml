# Hive Metastore deployment — standalone Thrift metastore service
# Uses init containers to:
#   1. Download PostgreSQL JDBC driver (apache/hive:3.1.3 ships with Derby only)
#   2. Initialize the metastore schema in PostgreSQL
# The metastore stores table metadata only — it does NOT access data files.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore
  namespace: metastore
  labels:
    app: hive-metastore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hive-metastore
  template:
    metadata:
      labels:
        app: hive-metastore
    spec:
      initContainers:
        # Step 1: Download PostgreSQL JDBC driver into a shared emptyDir volume.
        # apache/hive:3.1.3 only ships with Derby — PostgreSQL driver must be added.
        - name: download-postgres-driver
          image: busybox:1.36
          command:
            - wget
            - -O
            - /drivers/postgresql-jdbc.jar
            - https://jdbc.postgresql.org/download/postgresql-42.7.4.jar
          volumeMounts:
            - name: postgres-driver
              mountPath: /drivers
        # Step 2: Initialize the Hive metastore schema in PostgreSQL.
        # --ifNotExists makes this safe to run multiple times (idempotent).
        - name: schema-init
          image: apache/hive:3.1.3
          command:
            - /opt/hive/bin/schematool
          args:
            - -initSchema
            - -dbType
            - postgres
            - -ifNotExists
            - -verbose
          env:
            - name: HIVE_HOME
              value: /opt/hive
          volumeMounts:
            - name: metastore-config
              mountPath: /opt/hive/conf/metastore-site.xml
              subPath: metastore-site.xml
            - name: postgres-driver
              mountPath: /opt/hive/lib/postgresql-jdbc.jar
              subPath: postgresql-jdbc.jar
      containers:
        - name: metastore
          image: apache/hive:3.1.3
          ports:
            - name: thrift
              containerPort: 9083
          command:
            - /opt/hive/bin/hive
          args:
            - --service
            - metastore
          env:
            - name: HIVE_HOME
              value: /opt/hive
          volumeMounts:
            - name: metastore-config
              mountPath: /opt/hive/conf/metastore-site.xml
              subPath: metastore-site.xml
            - name: postgres-driver
              mountPath: /opt/hive/lib/postgresql-jdbc.jar
              subPath: postgresql-jdbc.jar
          readinessProbe:
            tcpSocket:
              port: 9083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9083
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: metastore-config
          configMap:
            name: hive-metastore-config
        - name: postgres-driver
          emptyDir: {}
