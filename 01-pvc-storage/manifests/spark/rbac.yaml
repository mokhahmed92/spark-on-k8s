# Spark RBAC: ServiceAccount + Role + RoleBinding
# The driver pod uses this ServiceAccount to create executor pods, services, and configmaps.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: spark
  labels:
    app: spark
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-role
  namespace: spark
  labels:
    app: spark
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update", "deletecollection"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "delete", "update", "deletecollection"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "delete", "update", "deletecollection"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "delete", "deletecollection"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-role-binding
  namespace: spark
  labels:
    app: spark
subjects:
  - kind: ServiceAccount
    name: spark
    namespace: spark
roleRef:
  kind: Role
  name: spark-role
  apiGroup: rbac.authorization.k8s.io
