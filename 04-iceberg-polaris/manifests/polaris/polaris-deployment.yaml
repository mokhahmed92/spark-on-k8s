# Apache Polaris 1.3.0-incubating — Iceberg REST Catalog Server
# Connects to PostgreSQL for persistent metadata storage.
# Ports: 8181 (REST catalog API), 8182 (management API)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polaris
  namespace: polaris
  labels:
    app: polaris
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polaris
  template:
    metadata:
      labels:
        app: polaris
    spec:
      containers:
        - name: polaris
          image: apache/polaris:apache-polaris-1.3.0-incubating
          ports:
            - name: catalog
              containerPort: 8181
            - name: management
              containerPort: 8182
          env:
            # Persistence — PostgreSQL via JDBC
            - name: POLARIS_PERSISTENCE_TYPE
              value: relational-jdbc
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: jdbc:postgresql://postgres.polaris.svc.cluster.local:5432/polaris
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: polaris-credentials
                  key: QUARKUS_DATASOURCE_USERNAME
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: polaris-credentials
                  key: QUARKUS_DATASOURCE_PASSWORD
            # Authentication — internal OAuth2 (Polaris manages tokens)
            - name: POLARIS_AUTHENTICATION_TYPE
              value: internal
            # Allow non-AWS S3 endpoints (required for MinIO)
            - name: POLARIS_FEATURES_DEFAULTS_ALLOW_SETTING_S3_ENDPOINTS
              value: "true"
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8182
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8182
            initialDelaySeconds: 30
            periodSeconds: 30
