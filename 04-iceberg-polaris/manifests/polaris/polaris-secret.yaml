# Polaris server credentials — database connection and root principal
apiVersion: v1
kind: Secret
metadata:
  name: polaris-credentials
  namespace: polaris
  labels:
    app: polaris
type: Opaque
stringData:
  # Database connection (must match postgres-secret.yaml)
  QUARKUS_DATASOURCE_USERNAME: polaris
  QUARKUS_DATASOURCE_PASSWORD: polaris123
  # Root principal credentials (used for bootstrap and Spark access)
  POLARIS_ROOT_CLIENT_ID: root
  POLARIS_ROOT_CLIENT_SECRET: s3cr3t
